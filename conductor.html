<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MotoRide - Conductor</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; overflow: hidden; height: 100vh; background: #000; }
        #map { height: 100%; width: 100%; z-index: 1; }
        
        .driver-panel {
            position: absolute; bottom: 0; left: 0; right: 0;
            background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(15px);
            padding: 24px; border-radius: 30px 30px 0 0; box-shadow: 0 -10px 40px rgba(0,0,0,0.2);
            z-index: 1000; display: flex; flex-direction: column;
            max-height: 40vh; overflow-y: auto;
        }
        .drag-handle { width: 40px; height: 5px; background-color: #d1d5db; border-radius: 10px; margin: 0 auto 20px auto; }
        
        .status-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
        .status-badge {
            display: flex; align-items: center; gap: 8px;
            background: #f3f4f6; padding: 8px 16px; border-radius: 50px;
        }
        .dot { width: 12px; height: 12px; border-radius: 50%; background: #9ca3af; }
        .dot.active { background: #10b981; box-shadow: 0 0 10px #10b981; }
        
        .toggle-btn {
            background: #000; color: white; border: none;
            padding: 12px 24px; border-radius: 30px; font-weight: 600;
            cursor: pointer; transition: 0.2s;
        }
        .toggle-btn.off { background: #ef4444; }
        
        .info-card {
            background: #f9fafb; border-radius: 16px; padding: 16px;
            margin-bottom: 15px; border: 1px solid #e5e7eb;
        }
        .info-card h4 { margin-bottom: 8px; color: #111827; }
        .info-card p { color: #6b7280; font-size: 14px; }
        
        .request-item {
            background: white; border: 1px solid #e5e7eb; border-radius: 12px;
            padding: 12px; margin-bottom: 10px; cursor: pointer;
            transition: all 0.2s;
        }
        .request-item:hover { border-color: #3b82f6; background: #f0f9ff; }
        .request-item.selected { border-color: #10b981; background: #ecfdf5; }
        
        .btn-accept {
            background: #10b981; color: white; border: none;
            padding: 14px; border-radius: 12px; font-weight: 600;
            width: 100%; margin-top: 10px; cursor: pointer;
        }
        .btn-logout {
            background: transparent; color: #6b7280; border: none;
            margin-top: 20px; padding: 12px; cursor: pointer;
            width: 100%;
        }
    </style>
</head>
<body>
    <div id="map"></div>
    
    <div class="driver-panel">
        <div class="drag-handle"></div>
        
        <div class="status-row">
            <div class="status-badge">
                <span class="dot" id="status-dot"></span>
                <span id="status-text">Desactivado</span>
            </div>
            <button class="toggle-btn off" id="toggle-availability">Activar Disponibilidad</button>
        </div>

        <div id="active-panel" style="display: none;">
            <div class="info-card">
                <h4>📍 Tu ubicación</h4>
                <p id="driver-coords">Esperando GPS...</p>
            </div>

            <div id="requests-container">
                <h4 style="margin-bottom: 10px;">🛵 Viajes cercanos (radio 5 km)</h4>
                <div id="requests-list">
                    <p style="color: #9ca3af; text-align: center;">No hay viajes cercanos</p>
                </div>
            </div>

            <div id="selected-request" style="display: none;" class="info-card">
                <h4>✅ Viaje seleccionado</h4>
                <p id="selected-dest"></p>
                <button class="btn-accept" onclick="acceptRide()">Aceptar viaje</button>
            </div>
        </div>

        <button class="btn-logout" onclick="logout()">Cerrar Sesión</button>
    </div>

    <script>
        // Configuración de Supabase (tus credenciales)
        const SUPABASE_URL = 'https://xdgdczezymaalcnwbfgi.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InhkZ2RjemV6eW1hYWxjbndiZmdpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMwNDU1NjgsImV4cCI6MjA4ODYyMTU2OH0.fyM-HOvnH8_XofOqjAyRe604m7EkodKDkhXqzhG7R_o';
        const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let map;
        let driverMarker;
        let pendingMarkers = {}; // { rideId: marker }
        let watchId = null;
        let currentUser = null;
        let driverActive = false;
        let currentPosition = { lat: 10.1620, lng: -68.0077 }; // fallback
        let selectedRideId = null;
        let ridesSubscription = null;
        let pendingRidesData = {}; // guardar datos completos de viajes

        // Inicializar mapa
        function initMap() {
            map = L.map('map', { zoomControl: true }).setView([currentPosition.lat, currentPosition.lng], 14);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                attribution: '© OpenStreetMap'
            }).addTo(map);

            // Marcador del conductor (azul)
            const driverIcon = L.divIcon({
                className: 'driver-icon',
                html: '<div style="background-color:#3b82f6; width:20px; height:20px; border-radius:50%; border:3px solid white; box-shadow:0 0 15px #3b82f6;"></div>',
                iconSize: [26, 26],
                iconAnchor: [13, 13]
            });
            driverMarker = L.marker([currentPosition.lat, currentPosition.lng], { icon: driverIcon }).addTo(map);
        }

        // Actualizar ubicación del conductor
        function updateDriverPosition(position) {
            const { latitude, longitude } = position.coords;
            currentPosition = { lat: latitude, lng: longitude };
            
            driverMarker.setLatLng([latitude, longitude]);
            map.panTo([latitude, longitude]);

            document.getElementById('driver-coords').innerText = `${latitude.toFixed(4)}, ${longitude.toFixed(4)}`;

            if (driverActive && currentUser) {
                updateDriverLocationInDB(latitude, longitude);
                // Al actualizar ubicación, refrescar viajes cercanos (opcional)
                loadNearbyPendingRides();
            }
        }

        // Guardar ubicación del conductor en Supabase (versión con lat/lng)
        async function updateDriverLocationInDB(lat, lng) {
            const { data: existing } = await supabase
                .from('driver_locations')
                .select('id')
                .eq('driver_id', currentUser.id)
                .maybeSingle();

            if (existing) {
                await supabase
                    .from('driver_locations')
                    .update({ lat: lat, lng: lng, updated_at: new Date() })
                    .eq('driver_id', currentUser.id);
            } else {
                await supabase
                    .from('driver_locations')
                    .insert({ driver_id: currentUser.id, lat: lat, lng: lng, is_active: true });
            }
        }

        // Activar/desactivar disponibilidad
        async function toggleAvailability() {
            if (!currentUser) {
                alert('Debes iniciar sesión primero');
                return;
            }

            driverActive = !driverActive;
            const toggleBtn = document.getElementById('toggle-availability');
            const statusDot = document.getElementById('status-dot');
            const statusText = document.getElementById('status-text');
            const activePanel = document.getElementById('active-panel');

            if (driverActive) {
                // Activar
                toggleBtn.innerText = 'Desactivar Disponibilidad';
                toggleBtn.classList.remove('off');
                statusDot.className = 'dot active';
                statusText.innerText = 'Disponible';
                activePanel.style.display = 'block';

                // Iniciar watchPosition si no está activo
                if (!watchId && navigator.geolocation) {
                    watchId = navigator.geolocation.watchPosition(
                        updateDriverPosition,
                        (error) => {
                            console.warn('Error GPS:', error);
                            document.getElementById('driver-coords').innerText = 'Error obteniendo ubicación';
                        },
                        { enableHighAccuracy: true, maximumAge: 0, timeout: 5000 }
                    );
                }

                // Si ya tenemos posición, guardar inmediatamente
                if (currentPosition) {
                    await updateDriverLocationInDB(currentPosition.lat, currentPosition.lng);
                    // Marcar como activo
                    await supabase
                        .from('driver_locations')
                        .update({ is_active: true })
                        .eq('driver_id', currentUser.id);
                }

                // Cargar viajes pendientes cercanos
                await loadNearbyPendingRides();

                // Suscribirse a nuevos viajes
                subscribeToNewRides();
            } else {
                // Desactivar
                toggleBtn.innerText = 'Activar Disponibilidad';
                toggleBtn.classList.add('off');
                statusDot.className = 'dot';
                statusText.innerText = 'Desactivado';
                activePanel.style.display = 'none';

                if (watchId) {
                    navigator.geolocation.clearWatch(watchId);
                    watchId = null;
                }

                // Marcar como inactivo en DB
                if (currentUser) {
                    await supabase
                        .from('driver_locations')
                        .update({ is_active: false })
                        .eq('driver_id', currentUser.id);
                }

                // Cancelar suscripción
                if (ridesSubscription) {
                    ridesSubscription.unsubscribe();
                    ridesSubscription = null;
                }

                // Limpiar marcadores de viajes
                Object.values(pendingMarkers).forEach(m => map.removeLayer(m));
                pendingMarkers = {};
                pendingRidesData = {};
                updateRequestsList();
            }
        }

        // Suscribirse a cambios en la tabla rides (nuevos pending)
        function subscribeToNewRides() {
            ridesSubscription = supabase
                .channel('rides-pending')
                .on('postgres_changes', 
                    { event: 'INSERT', schema: 'public', table: 'rides', filter: 'status=eq.pending' },
                    (payload) => {
                        const ride = payload.new;
                        // Verificar si está cerca
                        if (currentPosition) {
                            const dist = getDistanceFromLatLonInKm(
                                currentPosition.lat, currentPosition.lng,
                                ride.pickup_lat, ride.pickup_lng
                            );
                            if (dist <= 5) {
                                addRideMarker(ride);
                            }
                        }
                    }
                )
                .subscribe();
        }

        // Cargar viajes pendientes cercanos
        async function loadNearbyPendingRides() {
            if (!currentUser || !driverActive) return;

            const { data: rides, error } = await supabase
                .from('rides')
                .select('*')
                .eq('status', 'pending')
                .is('driver_id', null);

            if (error) {
                console.error('Error cargando viajes:', error);
                return;
            }

            // Limpiar marcadores anteriores
            Object.values(pendingMarkers).forEach(m => map.removeLayer(m));
            pendingMarkers = {};
            pendingRidesData = {};

            rides.forEach(ride => {
                if (currentPosition) {
                    const dist = getDistanceFromLatLonInKm(
                        currentPosition.lat, currentPosition.lng,
                        ride.pickup_lat, ride.pickup_lng
                    );
                    if (dist <= 5) {
                        addRideMarker(ride);
                    }
                }
            });
        }

        // Añadir un marcador de viaje al mapa y a la lista
        function addRideMarker(ride) {
            if (!driverActive) return;

            // Guardar datos completos
            pendingRidesData[ride.id] = ride;

            // Crear marcador
            const passengerIcon = L.divIcon({
                className: 'passenger-icon',
                html: '<div style="background-color:#ef4444; width:16px; height:16px; border-radius:50%; border:2px solid white; box-shadow:0 0 10px #ef4444;"></div>',
                iconSize: [20, 20],
                iconAnchor: [10, 10]
            });

            const marker = L.marker([ride.pickup_lat, ride.pickup_lng], { icon: passengerIcon })
                .addTo(map)
                .bindPopup(`Pasajero solicitó viaje`);

            marker.on('click', () => selectRide(ride.id));

            pendingMarkers[ride.id] = marker;

            updateRequestsList();
        }

        // Actualizar la lista de viajes en el panel
        function updateRequestsList() {
            const listDiv = document.getElementById('requests-list');
            if (Object.keys(pendingMarkers).length === 0) {
                listDiv.innerHTML = '<p style="color: #9ca3af; text-align: center;">No hay viajes cercanos</p>';
                return;
            }

            let html = '';
            Object.keys(pendingMarkers).forEach(rideId => {
                const ride = pendingRidesData[rideId] || {};
                html += `<div class="request-item ${selectedRideId === rideId ? 'selected' : ''}" onclick="selectRide('${rideId}')">
                    <strong>Viaje #${rideId.slice(0,6)}</strong><br>
                    <small>📍 A ${getDistanceFromLatLonInKm(currentPosition.lat, currentPosition.lng, ride.pickup_lat, ride.pickup_lng).toFixed(1)} km</small>
                </div>`;
            });
            listDiv.innerHTML = html;
        }

        // Seleccionar un viaje
        function selectRide(rideId) {
            selectedRideId = rideId;
            const ride = pendingRidesData[rideId];
            if (!ride) return;

            document.getElementById('selected-request').style.display = 'block';
            document.getElementById('selected-dest').innerHTML = `
                <strong>Destino:</strong> ${ride.dropoff_lat.toFixed(4)}, ${ride.dropoff_lng.toFixed(4)}<br>
                <strong>Distancia:</strong> ${getDistanceFromLatLonInKm(currentPosition.lat, currentPosition.lng, ride.pickup_lat, ride.pickup_lng).toFixed(1)} km
            `;

            // Resaltar marcador (opcional)
            updateRequestsList(); // para marcar el selected
        }

        // Aceptar el viaje seleccionado
        async function acceptRide() {
            if (!selectedRideId || !currentUser) return;

            const ride = pendingRidesData[selectedRideId];
            if (!ride) return;

            // Actualizar el viaje en la base de datos
            const { error } = await supabase
                .from('rides')
                .update({ driver_id: currentUser.id, status: 'accepted' })
                .eq('id', selectedRideId)
                .eq('status', 'pending');

            if (error) {
                alert('Error al aceptar: ' + error.message);
                return;
            }

            // Remover marcador y datos
            if (pendingMarkers[selectedRideId]) {
                map.removeLayer(pendingMarkers[selectedRideId]);
                delete pendingMarkers[selectedRideId];
            }
            delete pendingRidesData[selectedRideId];

            // Ocultar panel de selección
            document.getElementById('selected-request').style.display = 'none';
            selectedRideId = null;
            updateRequestsList();

            alert('Viaje aceptado! Dirígete al punto de encuentro.');
        }

        // Utilidad: calcular distancia (Haversine)
        function getDistanceFromLatLonInKm(lat1, lon1, lat2, lon2) {
            const R = 6371;
            const dLat = deg2rad(lat2 - lat1);
            const dLon = deg2rad(lon2 - lon1);
            const a = 
                Math.sin(dLat/2) * Math.sin(dLat/2) +
                Math.cos(deg2rad(lat1)) * Math.cos(deg2rad(lat2)) * 
                Math.sin(dLon/2) * Math.sin(dLon/2);
            const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
            return R * c;
        }
        function deg2rad(deg) { return deg * (Math.PI/180); }

        // Verificar sesión al cargar
        async function checkUser() {
            const { data: { session } } = await supabase.auth.getSession();
            if (session) {
                currentUser = session.user;
                initMap();
                // Intentar obtener ubicación inicial
                if (navigator.geolocation) {
                    navigator.geolocation.getCurrentPosition(
                        (pos) => {
                            currentPosition = { lat: pos.coords.latitude, lng: pos.coords.longitude };
                            driverMarker.setLatLng([currentPosition.lat, currentPosition.lng]);
                            map.setView([currentPosition.lat, currentPosition.lng], 16);
                            document.getElementById('driver-coords').innerText = `${currentPosition.lat.toFixed(4)}, ${currentPosition.lng.toFixed(4)}`;
                        },
                        (err) => {
                            console.warn('Error obteniendo ubicación inicial', err);
                            document.getElementById('driver-coords').innerText = 'Ubicación no disponible';
                        }
                    );
                }
            } else {
                // Redirigir al login (index.html)
                window.location.href = 'index.html';
            }
        }

        // Logout
        async function logout() {
            await supabase.auth.signOut();
            window.location.href = 'index.html';
        }

        // Event listeners
        document.getElementById('toggle-availability').addEventListener('click', toggleAvailability);

        window.onload = checkUser;
    </script>
</body>
</html>
